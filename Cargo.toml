[package]
name = "clothoid"
version = "0.1.0"
edition = "2021"

[features]
default = ["fresnel"]
fresnel = ["dep:fresnel"]

[dependencies]
fresnel = { version = "0.1.0", optional = true }

[dev-dependencies]
assert_float_eq = "1.1.3"
piston_window = "0.127.0"

[[example]]
name = "simple"
path = "examples/simple.rs"
