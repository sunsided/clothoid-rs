version: "3"

vars:
  CARGO: cargo

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  fmt:
    desc: Apply Rust formatting
    aliases:
      - fmt:fix
    cmds:
      - "{{.CARGO}} fmt"

  fmt:check:
    desc: Check Rust formatting
    cmds:
      - "{{.CARGO}} fmt -- --check"

  check:
    desc: Check the workspace
    cmds:
      - "{{.CARGO}} check"

  check:all:
    desc: Check the workspace with all targets
    cmds:
      - "{{.CARGO}} check --all-targets"

  lint:
    desc: Check clippy lints for all targets
    aliases:
      - lint:check
    cmds:
      - "{{.CARGO}} clippy --all-targets"

  lint:fix:
    desc: Apply clippy fixes
    aliases:
      - clippy
    cmds:
      - "{{.CARGO}} clippy --fix --allow-dirty --all-targets"

  build:
    desc: Build the workspace
    cmds:
      - "{{.CARGO}} build"

  test:
    desc: Run all tests
    aliases:
      - test:all
    cmds:
      - "{{.CARGO}} test --all-features"

  verify:
    desc: Run formatting checks, static checks, clippy, and tests
    deps:
      - fmt:check
      - check:all
      - lint:check
      - test

  clean:
    desc: Remove Cargo build artifacts
    cmds:
      - "{{.CARGO}} clean"

  example:
    desc: Run the interactive demo
    aliases:
      - run
      - demo
    cmds:
      - "{{.CARGO}} run --example interactive_demo"

  docs:
    desc: Build rustdoc
    aliases:
      - doc
    cmds:
      - cargo doc --no-deps --all-features

  docs:open:
    desc: Build rustdoc (and open them)
    aliases:
      - doc:open
    cmds:
      - cargo doc --no-deps --all-features --open
